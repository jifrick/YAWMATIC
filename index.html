<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    window.addEventListener('error', function(e) {
      var div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '10px';
      div.style.left = '10px';
      div.style.backgroundColor = 'rgba(255, 90, 31, 0.95)';
      div.style.color = 'white';
      div.style.padding = '15px';
      div.style.zIndex = '999999';
      div.style.fontFamily = 'monospace';
      div.style.borderRadius = '5px';
      div.innerHTML = '<strong>JS Error:</strong> ' + e.message + '<br>Line: ' + e.lineno + ' in ' + e.filename;
      document.body.appendChild(div);
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAWMATIC — Think Future. Build Different.</title>
  <meta name="description" content="YAWMATIC builds digital products, brands, and experiences that drive real impact and growth. Think Future. Build Different.">

      opacity: 0 !important;

    }

</head>
